<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 14px 16px;
      background: #121212;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      margin: 0;
    }
    .title { font-weight: 700; font-size: 13px; margin-bottom: 8px; }
    .note  { color: #b3b3b3; line-height: 1.5; margin-bottom: 12px; }
    button {
      width: 100%;
      padding: 8px;
      background: #14a800;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="title">⚡ Upwork Wizard</div>
  <div class="note" id="note">Go to Upwork to use the Wizard.</div>
  <button id="open-btn">Open on Upwork</button>
  <script src="popup.js"></script>
</body>
</html>
